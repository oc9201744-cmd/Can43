name: Compile Theos Tweak

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    name: Build iOS Tweak
    runs-on: macos-latest

    steps:
      - name: 📥 Repo Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: ⚙️ Gerekli Paketleri Kur
        run: brew install ldid dpkg xz fakeroot

      - name: 🛠️ Theos ve SDK Kurulumu
        run: |
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          curl -sL https://github.com/theos/sdks/archive/master.tar.gz | tar -x -z --strip-components=1 -C $GITHUB_WORKSPACE/theos/sdks

      - name: 🚀 Tweak'i Derle
        run: |
          # THEOS değişkenini hem export ediyoruz hem de make komutuna parametre geçiyoruz
          export THEOS=$GITHUB_WORKSPACE/theos
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless THEOS=$THEOS

      - name: 📦 Çıktıyı Kaydet
        uses: actions/upload-artifact@v4
        with:
          name: ESP-Tweak
          path: packages/*.deb
